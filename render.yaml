# Render Blueprint para MotorGo (wrapper MCP en Go)
# Documentacion: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: motor-render-mcp
    runtime: go
    plan: free
    region: oregon
    branch: main
    buildCommand: go build -o motorgo-server ./cmd/server
    startCommand: ./motorgo-server
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: ALLOWED_HOST
        value: "motor-render-mcp.onrender.com"
