# Render Blueprint para MotorRender MCP
# Documentación: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: motor-render-mcp
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.mcp.server
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: HOST
        value: "0.0.0.0"
